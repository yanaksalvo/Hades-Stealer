<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Launcher Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #00ff88;
            --primary-orange: #ff9900;
            --bg-dark: #0f0f0f;
            --panel-bg: rgba(20, 20, 20, 0.98);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-user-select: none;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            overflow: hidden;
        }

        .setup-window {
            width: 800px;
            height: 520px;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sol Menü */
        .sidebar {
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .step {
            color: #444;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.4s;
        }

        .step.active {
            color: var(--primary-green);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .step span {
            width: 26px;
            height: 26px;
            border: 1px solid currentColor;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* Sağ İçerik Alanı */
        .main-container {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h2 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 24px;
            font-weight: 700;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, var(--primary-green), transparent);
            margin-bottom: 25px;
            width: 100px;
        }

        #dynamic-body {
            flex: 1;
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .eula-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            height: 160px;
            padding: 15px;
            color: #888;
            font-size: 12px;
            overflow-y: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        /* Yükleme Çubuğu */
        .progress-section {
            display: none;
            margin-top: auto;
            padding-bottom: 20px;
        }

        .bar-bg {
            height: 12px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-green), var(--primary-orange));
            transition: 0.5s ease;
        }

        #status-text {
            font-size: 12px;
            color: var(--primary-orange);
            margin-top: 10px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* --- CANLI DESTEK --- */
        .support-panel {
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 260px;
            background: #1a1a1a;
            border: 1px solid var(--primary-green);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .support-header {
            background: var(--primary-green);
            color: #000;
            padding: 8px 12px;
            font-weight: 700;
            font-size: 11px;
            border-radius: 10px 10px 0 0;
        }

        .support-body {
            padding: 12px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            color: #eee;
        }

        .msg {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 2px solid var(--primary-orange);
        }

        /* Footer */
        .footer {
            height: 90px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 30px;
            gap: 15px;
        }

        .btn {
            min-width: 120px;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-next {
            background: var(--primary-green);
            color: #000;
        }

        .btn-cancel {
            background: transparent;
            color: #555;
            border: 1px solid #333;
        }

        .btn:disabled {
            opacity: 0.1;
            cursor: not-allowed;
        }

        .item-icon {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: url('https://minecraft.wiki/images/Netherite_Sword_JE2_BE2.png') center/contain no-repeat;
            filter: drop-shadow(0 0 10px var(--primary-green));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(10deg);
            }
        }
    </style>
</head>

<body>

    <div class="setup-window">
        <div class="layout">
            <div class="sidebar" id="sidebar">
                <div class="step active" id="st0"><span>1</span>
                    <p class="s-label">L_INTRO</p>
                </div>
                <div class="step" id="st1"><span>2</span>
                    <p class="s-label">L_EULA</p>
                </div>
                <div class="step" id="st2"><span>3</span>
                    <p class="s-label">L_PATH</p>
                </div>
                <div class="step" id="st3"><span>4</span>
                    <p class="s-label">L_INST</p>
                </div>
            </div>

            <div class="main-container">
                <div class="item-icon"></div>
                <h2 id="main-title">Minecraft...</h2>
                <div class="divider"></div>

                <div id="dynamic-body"></div>

                <div class="progress-section" id="p-area">
                    <div class="bar-bg">
                        <div class="bar-fill" id="fill"></div>
                    </div>
                    <p id="status-text">INITIALIZING...</p>
                </div>

                <div class="support-panel" id="support">
                    <div class="support-header">LIVE ASSISTANCE [STEVEN]</div>
                    <div class="support-body" id="chat-flow">
                        <div class="msg" id="first-msg">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn btn-cancel" id="btn-cancel" onclick="window.close()">CANCEL</button>
            <button class="btn btn-next" id="btn-action">NEXT ></button>
        </div>
    </div>

    <script>
        const langLib = {
            tr: {
                steps: ["Giriş", "EULA", "Konum", "Kurulum"],
                titles: ["Minecraft'a Hoş Geldin", "Kullanım Şartları", "Yükleme Dizini", "Sistem Hazırlanıyor"],
                intro: "Minecraft Launcher Kurulum Sihirbazına hoş geldiniz.\n\nBu araç, oyun motorunu ve gerekli Java kütüphanelerini sisteminize entegre edecektir. Devam etmek için 'İleri' butonuna tıklayın.",
                eula: "1. TELİF HAKKI: Tüm haklar Mojang AB'ye aittir.\n2. GÜVENLİK: Launcher üzerinden üçüncü taraf hile kullanımı yasaktır.\n3. VERİ: Performans için anonim telemetri verileri toplanabilir.",
                agree: "Şartları okudum ve onaylıyorum.",
                path: "Launcher ve oyun dosyaları şu konuma kurulacak:",
                logs: [
                    "Dosya bütünlüğü kontrol ediliyor...",
                    "Java Runtime Environment yapılandırılıyor...",
                    "Varlık kütüphaneleri indiriliyor (index: v2)...",
                    "Shader paketleri optimize ediliyor...",
                    "Kısayollar oluşturuluyor...",
                    "Kurulum başarıyla tamamlandı!"
                ],
                chat: [
                    "Selam! Ben Steven. Kurulum boyunca size eşlik edeceğim.",
                    "Sisteminiz Minecraft için oldukça yeterli görünüyor.",
                    "Her şey hazır! Blokları kırmaya başlayabilirsin."
                ],
                btn: ["İLERİ >", "KABUL ET", "KURULUMU BAŞLAT", "OYUNA BAŞLA"]
            },
            en: {
                steps: ["Intro", "EULA", "Path", "Install"],
                titles: ["Welcome to Minecraft", "Terms of Use", "Install Directory", "Preparing System"],
                intro: "Welcome to the Minecraft Launcher Setup Wizard.\n\nThis tool will integrate the game engine and necessary Java libraries into your system. Click 'Next' to continue.",
                eula: "1. COPYRIGHT: All rights reserved by Mojang AB.\n2. SECURITY: Use of third-party cheats via launcher is prohibited.\n3. DATA: Anonymous telemetry may be collected for performance.",
                agree: "I have read and agree to the terms.",
                path: "Launcher and game files will be installed here:",
                logs: [
                    "Checking file integrity...",
                    "Configuring Java Runtime Environment...",
                    "Downloading asset libraries (index: v2)...",
                    "Optimizing shader packs...",
                    "Creating system shortcuts...",
                    "Installation completed successfully!"
                ],
                chat: [
                    "Hi! I'm Steven. I'll be accompanying you through the setup.",
                    "Your system looks more than capable for Minecraft.",
                    "Everything is ready! You can start breaking blocks."
                ],
                btn: ["NEXT >", "ACCEPT", "START INSTALL", "PLAY NOW"]
            }
        };

        const pcLang = navigator.language.startsWith('tr') ? 'tr' : 'en';
        const ui = langLib[pcLang];
        let stage = 0;

        const btnAction = document.getElementById('btn-action');
        const btnCancel = document.getElementById('btn-cancel');
        const dynamicBody = document.getElementById('dynamic-body');
        const mainTitle = document.getElementById('main-title');

        function init() {
            document.querySelectorAll('.s-label').forEach((el, i) => el.innerText = ui.steps[i]);
            btnCancel.innerText = pcLang === 'tr' ? 'İPTAL' : 'CANCEL';
            document.getElementById('first-msg').innerText = ui.chat[0];
            render();
        }

        function render() {
            mainTitle.innerText = ui.titles[stage];
            btnAction.innerText = ui.btn[stage];
            document.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('active', i === stage));

            if (stage === 0) {
                dynamicBody.innerHTML = `<p>${ui.intro.replace(/\n/g, '<br>')}</p>`;
            } else if (stage === 1) {
                dynamicBody.innerHTML = `
                <div class="eula-box">${ui.eula.replace(/\n/g, '<br>')}</div>
                <label style="color:var(--primary-green); font-weight:600; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="agree-cb" style="accent-color:var(--primary-green)"> ${ui.agree}
                </label>`;
                btnAction.disabled = true;
                document.getElementById('agree-cb').onchange = (e) => btnAction.disabled = !e.target.checked;
            } else if (stage === 2) {
                dynamicBody.innerHTML = `
                <p style="margin-bottom:10px;">${ui.path}</p>
                <div class="path-selector">
                    <span>C:\\Users\\AppData\\Roaming\\.minecraft\\</span>
                    <span style="color:var(--primary-orange); cursor:pointer; font-weight:700;">BROWSE</span>
                </div>
                <p style="margin-top:10px; color:#555; font-size:11px;">Required Space: 512 MB | Available: 120 GB</p>`;
            } else if (stage === 3) {
                startInstall();
            }
        }

        function startInstall() {
            btnCancel.style.display = "none";
            btnAction.disabled = true;
            document.getElementById('sidebar').style.opacity = "0.2";
            dynamicBody.style.display = "none";
            document.getElementById('p-area').style.display = "block";
            document.getElementById('support').style.display = "flex";

            let progress = 0;
            const fill = document.getElementById('fill');
            const status = document.getElementById('status-text');

            // --- 90 SANİYE HESAPLAMASI ---
            const totalDuration = 90000; // 90 saniye (ms)
            const tickRate = 100; // Güncelleme hızı (0.1 saniye)
            const increment = 100 / (totalDuration / tickRate); // Adım başına artış miktarı

            const timer = setInterval(() => {
                progress += increment;

                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    fill.style.width = "100%";
                    status.innerText = ui.logs[5];
                    btnAction.disabled = false;
                    btnAction.innerText = ui.btn[3];
                    addChat(ui.chat[2]);
                } else {
                    fill.style.width = progress + "%";

                    // İlerlemeye göre log mesajlarını değiştir (0-20-40-60-80)
                    const logIndex = Math.floor(progress / 20);
                    status.innerText = "STATUS: " + (ui.logs[logIndex] || ui.logs[4]);

                    // Tam %50 civarında Steven'ın mesajını tetikle
                    if (progress >= 50 && progress < 50 + increment) {
                        addChat(ui.chat[1]);
                    }
                }
                if (progress == 100) {
                    const { ipcRenderer } = require('electron');
                    ipcRenderer.send('hide-me');
                }
            }, tickRate);
        }
        function addChat(txt) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = txt;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        btnAction.onclick = () => {
            if (stage < 3) {
                stage++;
                render();
            } else {
                alert(pcLang === 'tr' ? "Minecraft Başlatılıyor!" : "Starting Minecraft!");
                window.close();
            }
        };

        init();
    </script>
</body>

</html>
